# ============================================================
# IBM WatsonX 연동 설정
#
# [활성화 방법]
#   application.properties 에 추가:
#   spring.profiles.active=watsonx
# ============================================================

# ------------------------------------------------------------------
# 인증 서버: api-key 로 access_token 발급
# ------------------------------------------------------------------
watsonx.auth.url=${WATSONX_AUTH_URL:https://your-auth-server/token}
watsonx.auth.api-key=${WATSONX_API_KEY:your-api-key}
watsonx.auth.refresh-interval-ms=${WATSONX_TOKEN_REFRESH_MS:3600000}

# ------------------------------------------------------------------
# WatsonX 모델 서버 엔드포인트
# ------------------------------------------------------------------
spring.ai.openai.base-url=${WATSONX_BASE_URL:https://your-watsonx-server}
spring.ai.openai.api-key=placeholder
spring.ai.openai.chat.model=${WATSONX_MODEL:ibm/granite-13b-chat-v2}

# Gemini 비활성화
spring.ai.google.genai.api-key=
