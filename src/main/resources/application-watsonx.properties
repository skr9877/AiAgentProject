# ============================================================
# IBM WatsonX 모델 서버 연동 샘플 설정
# temperature 등 모델 파라미터는 서버에서 처리 — 여기서는 전달 안 함
#
# WatsonX로 전환하는 방법:
#   1. pom.xml에서 spring-ai-starter-model-openai 주석 해제
#      (spring-ai-starter-model-google-genai 는 주석 처리)
#   2. 아래 2줄을 application.properties에 복사 (spring.ai.google.genai.* 제거)
#
# 코드(ChatService, Tool 클래스) 변경 불필요
# ============================================================

spring.ai.openai.base-url=${WATSONX_URL:http://your-model-server}
spring.ai.openai.api-key=${WATSONX_API_KEY:your-api-key}
