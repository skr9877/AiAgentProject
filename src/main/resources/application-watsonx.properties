# ============================================================
# IBM WatsonX.ai 연동 샘플 설정 (spring-ai-starter-model-openai 사용)
#
# WatsonX는 OpenAI 호환 엔드포인트를 제공하므로
# Spring AI OpenAI 클라이언트로 연동 가능
#
# [활성화 방법]
#   1. application.properties 상단에 추가:
#      spring.profiles.active=watsonx
#   2. application.properties 에서 spring.ai.google.genai.* 라인 제거 또는 주석 처리
#   3. 아래 환경변수 설정 (또는 직접 값 입력)
# ============================================================

# ------------------------------------------------------------------
# WatsonX API 엔드포인트
# 리전별 URL 예시:
#   us-south : https://us-south.ml.cloud.ibm.com
#   eu-de    : https://eu-de.ml.cloud.ibm.com
#   jp-tok   : https://jp-tok.ml.cloud.ibm.com
# ------------------------------------------------------------------
spring.ai.openai.base-url=${WATSONX_BASE_URL:https://us-south.ml.cloud.ibm.com}

# IBM Cloud IAM Access Token (bearer token)
# 발급: ibmcloud iam oauth-tokens 또는 IAM API 호출
spring.ai.openai.api-key=${WATSONX_IAM_TOKEN:your-iam-access-token}

# ------------------------------------------------------------------
# 모델 ID (WatsonX 제공 모델 예시)
#   IBM 계열  : ibm/granite-13b-chat-v2
#              ibm/granite-3-8b-instruct
#   Meta 계열 : meta-llama/llama-3-3-70b-instruct
#              meta-llama/llama-3-2-11b-vision-instruct
#   Mistral   : mistralai/mistral-large
# ------------------------------------------------------------------
spring.ai.openai.chat.model=${WATSONX_MODEL:ibm/granite-13b-chat-v2}

# ------------------------------------------------------------------
# WatsonX 프로젝트 ID (필수)
# WatsonX.ai 콘솔 > 프로젝트 > 관리 > 일반에서 확인
# OpenAI 클라이언트는 project-id 파라미터를 직접 지원하지 않으므로
# base-url 에 쿼리스트링으로 포함하는 방식 사용:
#   base-url=https://us-south.ml.cloud.ibm.com/ml/v1?project_id=YOUR_PROJECT_ID
# ------------------------------------------------------------------
# spring.ai.openai.base-url=${WATSONX_BASE_URL:https://us-south.ml.cloud.ibm.com/ml/v1?project_id=YOUR_PROJECT_ID}

# ------------------------------------------------------------------
# 채팅 파라미터 (선택)
# ------------------------------------------------------------------
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=2048

# Gemini 설정 비활성화 (프로파일 충돌 방지)
spring.ai.google.genai.api-key=
