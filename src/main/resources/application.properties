server.port=8080
spring.config.import=optional:classpath:ai.properties,optional:classpath:db.properties
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.model=${GEMINI_MODEL:gemini-2.5-flash}


# External Java API Server
java.server.url=${JAVA_SERVER_URL:http://localhost:8080}

# Chat settings
chat.max-connections=100
chat.max-history-turns=10
