server.port=8080
spring.config.import=optional:classpath:ai.properties,optional:classpath:db.properties
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Gemini AI
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.endpoint-base=${GEMINI_ENDPOINT_BASE:https://generativelanguage.googleapis.com/v1}

# Oracle DB (Oracle 사용 시 아래 주석 해제 및 spring.autoconfigure.exclude 제거)
# spring.datasource.url=jdbc:oracle:thin:@${ORACLE_TNS:localhost:1521/XE}
# spring.datasource.username=${ORACLE_USER:}
# spring.datasource.password=${ORACLE_PASSWORD:}
# spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# spring.datasource.hikari.minimum-idle=2
# spring.datasource.hikari.maximum-pool-size=10
# spring.datasource.hikari.connection-timeout=30000
# spring.datasource.hikari.idle-timeout=1800000
# spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# External Java API Server
java.server.url=${JAVA_SERVER_URL:http://localhost:8080}

# Chat settings
chat.max-connections=100
chat.max-history-turns=10
